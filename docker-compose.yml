services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: talent
      POSTGRES_PASSWORD: talentpass
      POSTGRES_DB: hitalent
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talent -d hitalent"]
      interval: 2s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: migrations
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "postgres://talent:talentpass@db:5432/hitalent?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    environment:
      DATABASE_URL: "postgres://talent:talentpass@db:5432/hitalent?sslmode=disable"
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      migrations:
        condition: service_completed_successfully
    stdin_open: true
    tty: true
    command: ["go", "run", "./cmd/api"]

volumes:
  pgdata:
  go-mod-cache:
